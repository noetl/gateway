name: "Build Gateway image on Release ⚙️"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v2.10.0"
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build_push_image:
    name: build_push_image
    timeout-minutes: 10
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

      # Access must be provided on the package level
      # https://github.com/orgs/noetl/packages/container/gateway/settings
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tags
        id: image-tags
        shell: bash
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/noetl/gateway:${IMAGE_TAG}"
            if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
              echo "ghcr.io/noetl/gateway:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          # platforms: linux/amd64,linux/arm64
          platforms: linux/amd64
          push: true
          # outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=linux/amd64 linux/arm64 image
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=linux/amd64 image
          tags: ${{ steps.image-tags.outputs.tags }}
